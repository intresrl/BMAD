spring.application.name=foodcost

# Local development datasource (docker-compose PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/foodcost
spring.datasource.username=foodcost
spring.datasource.password=foodcost_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — Flyway owns all schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator — health endpoint publicly accessible (auth added in Story 1.2)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
