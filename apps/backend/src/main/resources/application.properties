spring.application.name=foodcost

# Local development datasource (docker-compose PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/foodcost
spring.datasource.username=foodcost
spring.datasource.password=foodcost_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — Flyway owns all schema changes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator — health endpoint publicly accessible (auth added in Story 1.2)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT configuration (Story 1.2) — override app.jwt.secret via env var in production
app.jwt.secret=dGhpcy1pcy1hLTI1Ni1iaXQtYmFzZTY0LXNlY3JldC1mb3ItZGV2LW9ubHktZG8tbm90LXVzZS1pbi1wcm9k
app.jwt.issuer=foodcost-api
app.jwt.access-token-expiry-minutes=15
app.jwt.refresh-token-expiry-days=30
