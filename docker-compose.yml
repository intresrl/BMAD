version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foodcost
      POSTGRES_USER: foodcost
      POSTGRES_PASSWORD: foodcost_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodcost -d foodcost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
